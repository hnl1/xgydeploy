name: 测试

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: 运行测试
        run: go test ./... -v -race -coverprofile=coverage.out
      - name: 测试覆盖率
        run: go tool cover -func=coverage.out
