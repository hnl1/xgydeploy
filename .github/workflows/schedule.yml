# 仙宫云实例自动调度
# 每小时触发，检查实例数量和 GPU 型号是否满足规则
name: 仙宫云调度

on:
  # 如需实际使用，请先配置 XGC_API_TOKEN、XGC_CONFIG、DINGTALK_WEBHOOK、DINGTALK_SECRET，
  # 再取消下面 schedule 配置的注释，并按需调整 cron 表达式。
  # schedule:
  #   - cron: "13 * * * *"
  workflow_dispatch:

jobs:
  schedule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: 执行调度
        env:
          XGC_API_TOKEN: ${{ secrets.XGC_API_TOKEN }}
          XGC_CONFIG: ${{ secrets.XGC_CONFIG }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: go run ./cmd/xgydeploy
