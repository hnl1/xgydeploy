# 仙宫云实例自动调度
# 每天 09:00 和 22:00（北京时间）附近多次触发，防止 GitHub Actions cron 跳过
name: 仙宫云调度

on:
  schedule:
    # 07:00 附近（北京）= 23:00 附近 UTC（前一天）
    - cron: "3 23 * * *"
    - cron: "17 23 * * *"
    - cron: "38 23 * * *"
    # 22:00 附近（北京）= 14:00 附近 UTC
    - cron: "7 14 * * *"
    - cron: "23 14 * * *"
    - cron: "41 14 * * *"
  workflow_dispatch:  # 支持手动触发

jobs:
  schedule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: 执行调度
        env:
          XGC_API_TOKEN: ${{ secrets.XGC_API_TOKEN }}
          XGC_CONFIG: ${{ secrets.XGC_CONFIG }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: go run ./cmd/xgydeploy
