# 仙宫云实例自动调度
# 每天 10:00 和 22:00（北京时间）执行
name: 仙宫云调度

on:
  schedule:
    # 10:00 北京 = 02:00 UTC, 22:00 北京 = 14:00 UTC
    - cron: "0 2,14 * * *"
  workflow_dispatch:  # 支持手动触发

jobs:
  schedule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: 执行调度
        env:
          XGC_API_TOKEN: ${{ secrets.XGC_API_TOKEN }}
          XGC_CONFIG: ${{ secrets.XGC_CONFIG }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: go run ./cmd/xgydeploy
