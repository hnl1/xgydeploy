# 手动触发：将当前 XGC_CONFIG 发送到钉钉，方便编辑前查看
name: 查看配置

on:
  workflow_dispatch:

jobs:
  show-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: 发送配置到钉钉
        env:
          XGC_CONFIG: ${{ secrets.XGC_CONFIG }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: go run ./cmd/show-config
